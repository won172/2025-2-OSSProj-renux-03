# fly.toml app configuration file generated for dongttok-api on 2026-05-12T14:28:56+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dongttok-api'
primary_region = 'nrt'

[build]

[env]
  ASPNETCORE_URLS = "http://+:8080"
  RagServiceTimeoutSeconds = "90"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
