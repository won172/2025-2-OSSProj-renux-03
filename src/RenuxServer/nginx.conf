events {}

http{

	# 컨테이너 로그 수집을 위해 stdout/stderr로 출력(파일은 재시작 시 유실).
	access_log /dev/stdout;
	error_log /dev/stderr warn;

	limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=20r/m;
	limit_req_zone $binary_remote_addr zone=global_limit:10m rate=60r/m;

	upstream renux_server{
		server api:8080;
	}

	map $http_upgrade $connection_upgrade{
		default keep-alive;
		websocket Upgrade;
	}

	server{
		listen 80;

		# 기본 보안 헤더(모든 location에 상속). CSP는 SPA 인라인 스타일과 충돌 위험이 있어
		# 별도 튜닝이 필요하므로 여기서는 제외(LAUNCH_READINESS.md 참고).
		add_header X-Frame-Options "SAMEORIGIN" always;
		add_header X-Content-Type-Options "nosniff" always;
		add_header Referrer-Policy "strict-origin-when-cross-origin" always;
		add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

		# 요청 본문 크기 제한(대용량 payload로 인한 RAG/DB 부하 방지).
		client_max_body_size 5m;

		# SSE 스트리밍 경로: 버퍼링하면 토큰이 실시간으로 흐르지 않고 묶여서 도착하므로
		# 반드시 버퍼링을 끄고, 긴 답변 생성을 위해 read timeout을 늘린다(기본 60s).
		location /chat/stream{
			limit_req zone=chat_limit burst=5 nodelay;
			limit_req_status 429;

			proxy_pass http://renux_server;

			proxy_http_version 1.1;
			proxy_set_header Connection "";

			proxy_buffering off;
			proxy_cache off;
			proxy_read_timeout 300s;

			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		location /{
			limit_req zone=global_limit burst=20 nodelay;
			limit_req_status 429;

			proxy_pass http://renux_server;

			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection $connection_upgrade;

			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}
	}
}
