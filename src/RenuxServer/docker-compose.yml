services:
    
    db: # docker run -d --name renux_db_test --env-file .\.env -v postgres_data_test:/var/lib/postgresql -p 5678:5432 postgres:latest
        container_name: renux_db_test
        image: postgres:latest
        env_file: .env
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data_test:/var/lib/postgresql
        ports:
            - "5678:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 5s 
            timeout: 5s
            retries: 5
            start_period: 30s
    
    api: # docker run -d --name renux_server_test -e ASTNETCORE_ENVIRONMENT=Production -e 
        container_name: renux_server_test
        build:
            context: .
            dockerfile: Dockerfile
        depends_on:
            db:
                condition: service_healthy
            rag-service:
                condition: service_started
        env_file: .env
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
            - ASPNETCORE_URLS=http://+:8080
            - ConnectionStrings__RenuxServer=${CONNECTIONSTRING}
            - Jwt__Key=${JWT_KEY}
            - RAG_SERVICE_URL=http://rag-service:8000
            - RagServiceTimeoutSeconds=${RAG_SERVICE_TIMEOUT_SECONDS:-300}
        restart: on-failure
 
    rag-service:
        container_name: renux_rag_test
        build:
            context: ../RAG
            dockerfile: Dockerfile
        volumes:
            - ../RAG/huggingface_cache:/root/.cache/huggingface
            - ../RAG/artifacts:/app/artifacts
            - ../RAG/data:/app/data
            - ../RAG/rag_database.db:/app/rag_database.db
            - ../RAG/data:/app/data
        depends_on:
            - redis
            - ollama
        env_file:
            - .env
            - ../RAG/.env
        environment:
            # 답변 생성 프로바이더: "openai"(기본) 또는 "ollama".
            - LLM_PROVIDER=${LLM_PROVIDER:-openai}
            # 질의분석/라우터는 항상 OpenAI를 사용하므로 키는 필수.
            - OPENAI_API_KEY=${OPENAI_API_KEY}
            - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4o-mini}
            # 로컬 LLM(Ollama)을 쓸 때만 필요. host.docker.internal 로 호스트의 Ollama에 접속.
            - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
            - OLLAMA_CHAT_MODEL=${OLLAMA_CHAT_MODEL:-qwen3:4b-instruct-2507-q4_K_M}
            - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-300}
            - REDIS_URL=redis://redis:6379/0
        restart: on-failure

    ollama:
        container_name: renux_ollama
        image: ollama/ollama:latest
        ports:
            - "11434:11434"
        volumes:
            - ollama_data:/root/.ollama
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities: [gpu]
        restart: always

    redis:
        container_name: renux_redis_internal
        image: redis:alpine
        ports:
            - "6380:6379"
        volumes:
            - redis_data:/data
        restart: always

    nginx:
        container_name: renux_nginx_test
        image: nginx:latest
        ports:
            - "8080:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - api
volumes:
    postgres_data_test:
    redis_data:
    ollama_data:
