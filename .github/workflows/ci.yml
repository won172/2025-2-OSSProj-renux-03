name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/scan-secrets.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/RenuxServer/wwwroot/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/RenuxServer/wwwroot/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/RenuxServer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore RenuxServer.sln
      - run: dotnet build RenuxServer.sln --configuration Release --no-restore

  rag:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/RAG
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m py_compile api/rag_service.py src/services/router.py src/services/langchain_chat.py src/config.py
